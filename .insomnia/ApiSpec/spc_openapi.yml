    securitySchemes:
      ZitadelFrontendJWT:
        openIdConnectUrl: https://${var.oidc_issuer}/.well-known/openid-configuration
        type: openIdConnect
        x-yc-apigateway-authorizer:
          type: jwt
          jwksUri: https://${var.oidc_issuer}/oauth/v2/keys
          authorizer_result_caching_mode: path
          authorizer_result_ttl_in_seconds: 300
          identitySource:
            in: header
            name: Authorization
            prefix: 'Bearer '
          issuers:
            - https://${var.oidc_issuer}
          requiredClaims:
            - prid
            - scp
      ZitadelExternalJWT:
        openIdConnectUrl: https://${var.oidc_issuer}/.well-known/openid-configuration
        type: openIdConnect
        x-yc-apigateway-authorizer:
          type: jwt
          jwksUri: https://${var.oidc_issuer}/oauth/v2/keys
          authorizer_result_caching_mode: path
          authorizer_result_ttl_in_seconds: 300
          identitySource:
            in: header
            name: Authorization
            prefix: 'Bearer '
          issuers:
            - https://${var.oidc_issuer}
          requiredClaims:
            - scp
