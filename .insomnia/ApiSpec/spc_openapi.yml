{
  "_id": "spc_openapi",
  "type": "ApiSpec",
  "parentId": "wrk_api_portal",
  "modified": 1777690447547,
  "created": 1777690447547,
  "fileName": "Portal-Profile API",
  "contentType": "yaml",
  "contents": "openapi: 3.0.0\ninfo:\n  title: Portal-Profile API\n  version: 1.0.0\n  description: |+\n    ### Backend API для корпоративного портала AstraZeneca.\n\n    - path: `/api/v1/attorney` \n      method: **GET** \n      description: Получение списка доверенностей\n\n    - path: `/api/v1/attorney-requests` \n      method: **GET** \n      description: Список заявок\n\n    - path: `/api/v1/attorney-requests/draft` \n      method: **POST** \n      description: Сохранить как черновик\n\n    - path: `/api/v1/attorney-requests/draft` \n      method: **GET** \n      description: Получить черновик\n\n    - path: `/api/v1/attorney-requests/draft` \n      method: **PATCH** \n      description: Обновить черновик заявки\n\n    - path: `/api/v1/attorney-requests/form-references` \n      method: **GET** \n      description: Справочники для формы\n\n    - path: `/api/v1/attorney-requests/submit` \n      method: **POST** \n      description: Отправить заявку в оркестратор\n\n    - path: `/api/v1/attorney-requests/{attorneys_request_uuid}` \n      method: **GET** \n      description: Получить заявку по UUID\n\n    - path: `/api/v1/attorney-requests/{attorneys_request_uuid}/files` \n      method: **POST** \n      description: Загрузить файл\n\n    - path: `/api/v1/attorney-requests/{attorneys_request_uuid}/files/{file_uuid}` \n      method: **GET** \n      description: Получить ссылку на скачивание файла заявки\n\n    - path: `/api/v1/attorney/{attorney_uuid}` \n      method: **GET** \n      description: Получить запись доверенности по UUID\n\n    - path: `/api/v1/attorney/{attorney_uuid}/files/{file_uuid}` \n      method: **GET** \n      description: Получить подписанную ссылку на файл по UUID\n\n    - path: `/api/v1/external/attorney-requests` \n      method: **GET** \n      description: Получить список необработанных заявок\n\n    - path: `/api/v1/external/attorney-requests/{attorneys_request_uuid}/files/{file_uuid}` \n      method: **GET** \n      description: Получить ссылку на скачивание файла заявки (external)\n\n    - path: `/api/v1/org-structure/{employee_id}` \n      method: **GET** \n      description: Получение оргструктуры по employee_id\n\n    - path: `/api/v1/profile` \n      method: **GET** \n      description: Формирование профиля пользователя\n\n    - path: `/api/v1/profile-by-employee/{employee_id}` \n      method: **GET** \n      description: Профиль другого пользователя портала по employee_id\n\n    - path: `/api/v1/profile-information/{prid}` \n      method: **GET** \n      description: Получение профиля по PRID для внутреннего сервиса\n\n    - path: `/api/v1/webhooks/attorney-status-update` \n      method: **POST** \n      description: Обновление статуса заявки (от Directum)\n\n    - path: `/api/v1/webhooks/attorney-sync` \n      method: **POST** \n      description: Синхронизация доверенности (от Directum)\n\n    - path: `/api/v1/webhooks/authority-dictionary-sync` \n      method: **POST** \n      description: Синхронизация справочника полномочий для пользователей (от Directum)\n\nservers:\n  - url: https://dev-eflow.astrazenecacloud.ru\n    description: API Gateway\ntags:\n  - name: profile\n    x-displayName: profile\n  - name: attorneys\n    x-displayName: attorneys\n  - name: attorneys-request\n    x-displayName: attorneys-request\n  - name: attorney-external\n    x-displayName: attorney-external\n  - name: attorney-webhooks\n    x-displayName: attorney-webhooks\n  - name: user-attorney_part_other\n    x-displayName: other\npaths:\n  /api/v1/profile:\n    get:\n      tags:\n        - profile\n      summary: Формирование профиля пользователя\n      description: Формирует набор данных по профилю пользователя на данных пользователя, полученных из заголовков API Gateway\n      operationId: getProfile\n      parameters:\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      responses:\n        '200':\n          description: Успешно сформированы данные профиля пользователя\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/JsonApiProfile'\n        '400':\n          description: Ошибка парсинга ролей\n        '404':\n          description: Профиль по PRID не найден\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      security:\n        - ZitadelFrontendJWT: []\n      x-yc-apigateway-integration:\n        type: http\n        method: GET\n        url: https://var.backend_url/${var.profile_backend}/api/v1/profile\n        headers:\n          X-Sec-Gwtoken: ${var.x_sec_gw}\n          Content-Type: application/json\n        timeouts:\n          read: 5\n          connect: 5\n  /api/v1/profile-information/{prid}:\n    get:\n      tags:\n        - profile\n      summary: Получение профиля по PRID для внутреннего сервиса\n      description: По умолчанию (`view=full`) возвращает расширенные данные профиля пользователя по PRID (табельный номер, дата рождения, телефон, должность и код подразделения, руководитель, поля документов и статус паспорта) для внутреннего использования без API Gateway. При `view=person_dss` — тот же ресурс, но узкий набор полей (PRID, ФИО RUS, ДСС) и лёгкий запрос к БД.\n      operationId: getProfileInformation\n      parameters:\n        - name: prid\n          in: path\n          required: true\n          schema:\n            type: string\n            title: Prid\n        - name: view\n          in: query\n          required: false\n          schema:\n            enum:\n              - full\n              - person_dss\n            type: string\n            description: full — расширенный профиль; person_dss — только PRID, ФИО (RUS) и признак ДСС (лёгкий запрос без документов и цепочки руководителя)\n            default: full\n            title: View\n          description: full — расширенный профиль; person_dss — только PRID, ФИО (RUS) и признак ДСС (лёгкий запрос без документов и цепочки руководителя)\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      responses:\n        '200':\n          description: 'Успешно: при view=full — расширенный профиль по PRID; при view=person_dss — только PRID, ФИО (RUS) и признак ДСС (JSON:API, разные схемы attributes)'\n          content:\n            application/json:\n              schema:\n                anyOf:\n                  - $ref: '#/components/schemas/JsonApiProfileInformation'\n                  - $ref: '#/components/schemas/JsonApiProfileInformationPersonDss'\n                title: Response Get Profile Information Api V1 Profile Information  Prid  Get\n        '404':\n          description: Профиль по указанному PRID не найден\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      security:\n        - ZitadelFrontendJWT: []\n      x-yc-apigateway-integration:\n        type: http\n        method: GET\n        url: https://var.backend_url/${var.profile_backend}/api/v1/profile-information/{prid}\n        headers:\n          X-Sec-Gwtoken: ${var.x_sec_gw}\n          Content-Type: application/json\n        timeouts:\n          read: 5\n          connect: 5\n  /api/v1/org-structure/{employee_id}:\n    get:\n      tags:\n        - profile\n      summary: Получение оргструктуры по employee_id\n      description: 'Возвращает данные для модального окна «Структура»: карточку текущего сотрудника, цепочку его руководителей (до 2 уровней вверх; depth=0 — самый верхний), полный список прямых подчинённых и коллег того же подразделения. В каждой карточке: ФИО, должность, подразделение, признак is_online (стаб). Подчинённые и коллеги отдаются целиком вместе с total — клиент сам ограничивает отображение и реализует «Раскрыть/Скрыть».'\n      operationId: getOrgStructure\n      parameters:\n        - name: employee_id\n          in: path\n          required: true\n          schema:\n            type: string\n            format: uuid\n            title: Employee Id\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      responses:\n        '200':\n          description: 'Успешно: текущий сотрудник, цепочка руководителей до 2 уровней вверх, прямые подчинённые и коллеги по подразделению (JSON:API, type=org-structure)'\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/JsonApiOrgStructure'\n        '404':\n          description: Сотрудник по указанному employee_id не найден\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      security:\n        - ZitadelFrontendJWT: []\n      x-yc-apigateway-integration:\n        type: http\n        method: GET\n        url: https://var.backend_url/${var.profile_backend}/api/v1/org-structure/{employee_id}\n        headers:\n          X-Sec-Gwtoken: ${var.x_sec_gw}\n          Content-Type: application/json\n        timeouts:\n          read: 5\n          connect: 5\n  /api/v1/profile-by-employee/{employee_id}:\n    get:\n      tags:\n        - profile\n      summary: Профиль другого пользователя портала по employee_id\n      description: 'Возвращает набор полей, необходимых для правого сайдбара «Профиль» при клике по иконке другого пользователя: ФИО, инициалы, должность, организация, подразделение, руководитель (с employee_id для перехода к его профилю), формат работы, дата рождения и контакты. Нейминг полей идентичен ручке /profile. Отсутствующие в БД атрибуты не включаются в ответ, чтобы фронт просто не рендерил соответствующие блоки.'\n      operationId: getProfileByEmployee\n      parameters:\n        - name: employee_id\n          in: path\n          required: true\n          schema:\n            type: string\n            format: uuid\n            title: Employee Id\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      responses:\n        '200':\n          description: 'Успешно: профиль другого пользователя по employee_id (JSON:API, type=employee-profiles-flat). Отсутствующие атрибуты исключаются из ответа.'\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/JsonApiProfileByEmployee'\n        '404':\n          description: Сотрудник по указанному employee_id не найден\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      security:\n        - ZitadelFrontendJWT: []\n      x-yc-apigateway-integration:\n        type: http\n        method: GET\n        url: https://var.backend_url/${var.profile_backend}/api/v1/profile-by-employee/{employee_id}\n        headers:\n          X-Sec-Gwtoken: ${var.x_sec_gw}\n          Content-Type: application/json\n        timeouts:\n          read: 5\n          connect: 5\n  /api/v1/attorney:\n    get:\n      tags:\n        - attorneys\n      summary: Получение списка доверенностей\n      description: 'Список доверенностей текущего пользователя: prid из заголовка x-yc-apigateway-authorization-context. Включает записи, где пользователь — инициатор или представитель (прокси).'\n      operationId: getAttorneyList\n      parameters:\n        - name: filter[attributes.status]\n          in: query\n          required: false\n          schema:\n            title: Filter[Attributes.Status]\n            nullable: true\n            type: string\n        - name: sort\n          in: query\n          required: false\n          schema:\n            type: string\n            description: Сортировка по дате обновления\n            default: '-meta.updated_at'\n            title: Sort\n          description: Сортировка по дате обновления\n        - name: page[limit]\n          in: query\n          required: false\n          schema:\n            type: integer\n            maximum: 100\n            minimum: 1\n            default: 100\n            title: Page[Limit]\n        - name: page[offset]\n          in: query\n          required: false\n          schema:\n            type: integer\n            minimum: 0\n            default: 0\n            title: Page[Offset]\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      responses:\n        '200':\n          description: Successful Response\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/AttorneyListResponse'\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      security:\n        - ZitadelFrontendJWT: []\n      x-yc-apigateway-integration:\n        type: http\n        method: GET\n        url: https://var.backend_url/${var.attorneys}/api/v1/attorney\n        headers:\n          X-Sec-Gwtoken: ${var.x_sec_gw}\n          Content-Type: application/json\n        timeouts:\n          read: 5\n          connect: 5\n  /api/v1/attorney/{attorney_uuid}:\n    get:\n      tags:\n        - attorneys\n      summary: Получить запись доверенности по UUID\n      description: Метод возвращает запись доверенности по её UUID.\n      operationId: getAttorneyById\n      parameters:\n        - name: attorney_uuid\n          in: path\n          required: true\n          schema:\n            type: string\n            format: uuid\n            title: Attorney Uuid\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      responses:\n        '200':\n          description: Successful Response\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/AttorneyDetailResponse'\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      security:\n        - ZitadelFrontendJWT: []\n      x-yc-apigateway-integration:\n        type: http\n        method: GET\n        url: https://var.backend_url/${var.attorneys}/api/v1/attorney/{attorney_uuid}\n        headers:\n          X-Sec-Gwtoken: ${var.x_sec_gw}\n          Content-Type: application/json\n        timeouts:\n          read: 5\n          connect: 5\n  /api/v1/attorney/{attorney_uuid}/files/{file_uuid}:\n    get:\n      tags:\n        - attorneys\n      summary: Получить подписанную ссылку на файл по UUID\n      description: Метод возвращает ссылку на скачивание доверенности по её UUID.\n      operationId: getFileDownload\n      parameters:\n        - name: attorney_uuid\n          in: path\n          required: true\n          schema:\n            type: string\n            format: uuid\n            title: Attorney Uuid\n        - name: file_uuid\n          in: path\n          required: true\n          schema:\n            type: string\n            format: uuid\n            title: File Uuid\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      responses:\n        '200':\n          description: Successful Response\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/FileDownloadResponse'\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      security:\n        - ZitadelFrontendJWT: []\n      x-yc-apigateway-integration:\n        type: http\n        method: GET\n        url: https://var.backend_url/${var.attorneys}/api/v1/attorney/{attorney_uuid}/files/{file_uuid}\n        headers:\n          X-Sec-Gwtoken: ${var.x_sec_gw}\n          Content-Type: application/json\n        timeouts:\n          read: 5\n          connect: 5\n  /api/v1/attorney-requests/form-references:\n    get:\n      tags:\n        - attorneys-request\n      summary: Справочники для формы\n      operationId: getFormReferences\n      parameters:\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      responses:\n        '200':\n          description: Successful Response\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/FormReferencesResponse'\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      description: Справочники для формы\n      security:\n        - ZitadelFrontendJWT: []\n      x-yc-apigateway-integration:\n        type: http\n        method: GET\n        url: https://var.backend_url/${var.attorneys}/api/v1/attorney-requests/form-references\n        headers:\n          X-Sec-Gwtoken: ${var.x_sec_gw}\n          Content-Type: application/json\n        timeouts:\n          read: 5\n          connect: 5\n  /api/v1/attorney-requests:\n    get:\n      tags:\n        - attorneys-request\n      summary: Список заявок\n      operationId: getRequestList\n      parameters:\n        - name: limit\n          in: query\n          required: false\n          schema:\n            type: integer\n            maximum: 1000\n            minimum: 1\n            default: 100\n            title: Limit\n        - name: offset\n          in: query\n          required: false\n          schema:\n            type: integer\n            minimum: 0\n            default: 0\n            title: Offset\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      responses:\n        '200':\n          description: Successful Response\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/AttorneyRequestFullList'\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      description: Список заявок\n      security:\n        - ZitadelFrontendJWT: []\n      x-yc-apigateway-integration:\n        type: http\n        method: GET\n        url: https://var.backend_url/${var.attorneys}/api/v1/attorney-requests\n        headers:\n          X-Sec-Gwtoken: ${var.x_sec_gw}\n          Content-Type: application/json\n        timeouts:\n          read: 5\n          connect: 5\n  /api/v1/attorney-requests/draft:\n    post:\n      tags:\n        - attorneys-request\n      summary: Сохранить как черновик\n      operationId: saveDraft\n      parameters:\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/AttorneyRequestDraftWrite'\n      responses:\n        '200':\n          description: Successful Response\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/AttorneyRequestRead'\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      description: Сохранить как черновик\n      security:\n        - ZitadelFrontendJWT: []\n      x-yc-apigateway-integration:\n        type: http\n        method: POST\n        url: https://var.backend_url/${var.attorneys}/api/v1/attorney-requests/draft\n        headers:\n          X-Sec-Gwtoken: ${var.x_sec_gw}\n          Content-Type: application/json\n        timeouts:\n          read: 5\n          connect: 5\n    get:\n      tags:\n        - attorneys-request\n      summary: Получить черновик\n      operationId: getDraft\n      parameters:\n        - name: X-Request-ID\n          in: header\n          required: false\n          schema:\n            title: X-Request-Id\n            nullable: true\n            type: string\n            format: uuid\n          description: Correlation ID для трассировки\n        - name: x-yc-apigateway-authorization-context\n          in: header\n          required: false\n          schema:\n            title: X-Yc-Apigateway-Authorization-Context\n            nullable: true\n            type: string\n          description: JWT claims в base64 формате\n      responses:\n        '200':\n          description: Successful Response\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/AttorneyRequestRead'\n        '422':\n          description: Validation Error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/HTTPValidationError'\n      description: Получить черновик\n      security:\n