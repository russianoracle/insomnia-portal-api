          headers:
            X-Sec-Gwtoken: ${var.x_sec_gw}
            Content-Type: application/json
          timeouts:
            read: 5
            connect: 5
      get:
        tags:
          - attorneys-request
        summary: Получить черновик
        operationId: getDraft
        parameters:
          - name: X-Request-ID
            in: header
            required: false
            schema:
              title: X-Request-Id
              nullable: true
              type: string
              format: uuid
            description: Correlation ID для трассировки
          - name: x-yc-apigateway-authorization-context
            in: header
            required: false
            schema:
              title: X-Yc-Apigateway-Authorization-Context
              nullable: true
              type: string
            description: JWT claims в base64 формате
        responses:
          '200':
            description: Successful Response
            content:
