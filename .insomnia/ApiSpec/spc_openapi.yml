            description: Сортировка по дате обновления
          - name: page[limit]
            in: query
            required: false
            schema:
              type: integer
              maximum: 100
              minimum: 1
              default: 100
              title: Page[Limit]
          - name: page[offset]
            in: query
            required: false
            schema:
              type: integer
              minimum: 0
              default: 0
              title: Page[Offset]
          - name: X-Request-ID
            in: header
            required: false
            schema:
              title: X-Request-Id
              nullable: true
              type: string
              format: uuid
            description: Correlation ID для трассировки
          - name: x-yc-apigateway-authorization-context
            in: header
            required: false
            schema:
              title: X-Yc-Apigateway-Authorization-Context
              nullable: true
              type: string
            description: JWT claims в base64 формате
        responses:
          '200':
            description: Successful Response
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/AttorneyListResponse'
          '422':
            description: Validation Error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/HTTPValidationError'
        security:
          - ZitadelFrontendJWT: []
        x-yc-apigateway-integration:
          type: http
          method: GET
          url: https://var.backend_url/${var.attorneys}/api/v1/attorney
          headers:
            X-Sec-Gwtoken: ${var.x_sec_gw}
            Content-Type: application/json
          timeouts:
            read: 5
            connect: 5
    /api/v1/attorney/{attorney_uuid}:
      get:
